{% extends "base.html" %}

{% block title %}Scans - VulnAnalyzer{% endblock %}

{% block content %}
<!-- Page Header -->
<div class="animate-in" style="display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 32px;">
    <div>
        <h1 class="page-title">Scans</h1>
        <p class="page-subtitle">View and manage all vulnerability assessments</p>
    </div>
    <a href="/web/scan/new" class="btn btn-primary">
        <span>➕</span> New Scan
    </a>
</div>

<!-- Filters -->
<div class="filter-bar animate-in" style="animation-delay: 0.1s;">
    <div class="filter-group">
        <label class="filter-label">Search</label>
        <input type="text" class="form-input" id="search-target" placeholder="Search targets...">
    </div>
    <div class="filter-group" style="flex: 0 0 180px;">
        <label class="filter-label">Type</label>
        <select class="form-select" id="filter-type">
            <option value="">All Types</option>
            <option value="quick">Quick</option>
            <option value="full">Full</option>
            <option value="stealth">Stealth</option>
        </select>
    </div>
    <div class="filter-group" style="flex: 0 0 180px;">
        <label class="filter-label">Status</label>
        <select class="form-select" id="filter-status">
            <option value="">All Status</option>
            <option value="pending">Pending</option>
            <option value="running">Running</option>
            <option value="completed">Completed</option>
            <option value="failed">Failed</option>
        </select>
    </div>
    <div class="filter-group" style="flex: 0 0 auto; display: flex; align-items: flex-end;">
        <button class="btn btn-primary" onclick="loadScans(1)">
            <span>🔍</span> Filter
        </button>
    </div>
</div>

<!-- Table -->
<div class="card animate-in" style="animation-delay: 0.2s;">
    <div class="table-wrapper">
        <table class="data-table">
            <thead>
                <tr>
                    <th>Target</th>
                    <th>Type</th>
                    <th>Status</th>
                    <th>Critical</th>
                    <th>High</th>
                    <th>Medium</th>
                    <th>Low</th>
                    <th>Total</th>
                    <th>Date</th>
                    <th></th>
                </tr>
            </thead>
            <tbody id="scans-table">
                <tr>
                    <td colspan="10">
                        <div class="empty-state">
                            <div class="skeleton" style="height: 24px; width: 50%; margin: 0 auto 12px;"></div>
                            <div class="skeleton" style="height: 24px; width: 30%; margin: 0 auto;"></div>
                        </div>
                    </td>
                </tr>
            </tbody>
        </table>
    </div>
    
    <div id="pagination" style="padding: 20px; display: flex; justify-content: center; border-top: 1px solid var(--border-light);"></div>
</div>
{% endblock %}

{% block extra_js %}
<script>
let currentPage = 1;

async function loadScans(page = 1) {
    currentPage = page;
    const target = document.getElementById('search-target').value;
    const type = document.getElementById('filter-type').value;
    const status = document.getElementById('filter-status').value;
    
    let url = `/api/scans?page=${page}&per_page=20`;
    if (target) url += `&target=${encodeURIComponent(target)}`;
    if (type) url += `&scan_type=${type}`;
    if (status) url += `&status=${status}`;
    
    try {
        const response = await fetch(url);
        const data = await response.json();
        
        const tbody = document.getElementById('scans-table');
        
        if (data.scans.length === 0) {
            tbody.innerHTML = `
                <tr>
                    <td colspan="10">
                        <div class="empty-state">
                            <div class="empty-icon">📋</div>
                            <div class="empty-title">No scans found</div>
                            <div class="empty-description">Try adjusting your filters or start a new scan</div>
                            <a href="/web/scan/new" class="btn btn-primary">New Scan</a>
                        </div>
                    </td>
                </tr>`;
            document.getElementById('pagination').innerHTML = '';
            return;
        }
        
        tbody.innerHTML = data.scans.map(scan => `
            <tr>
                <td>
                    <span class="text-mono" style="font-weight: 500;">${scan.target}</span>
                </td>
                <td>
                    <span class="badge badge-gray">${scan.scan_type}</span>
                </td>
                <td>
                    <span class="badge badge-${scan.status === 'completed' ? 'green' : scan.status === 'running' ? 'blue' : scan.status === 'failed' ? 'red' : 'gray'}">
                        <span class="status-dot ${scan.status}"></span>
                        ${scan.status}
                    </span>
                </td>
                <td>
                    <span class="text-mono" style="font-weight: ${scan.critical_count > 0 ? '600' : '400'}; color: ${scan.critical_count > 0 ? 'var(--accent-red)' : 'var(--text-tertiary)'};">${scan.critical_count}</span>
                </td>
                <td>
                    <span class="text-mono" style="color: ${scan.high_count > 0 ? 'var(--accent-orange)' : 'var(--text-tertiary)'};">${scan.high_count}</span>
                </td>
                <td>
                    <span class="text-mono" style="color: ${scan.medium_count > 0 ? 'var(--accent-orange)' : 'var(--text-tertiary)'};">${scan.medium_count}</span>
                </td>
                <td>
                    <span class="text-mono" style="color: ${scan.low_count > 0 ? 'var(--accent-green)' : 'var(--text-tertiary)'};">${scan.low_count}</span>
                </td>
                <td>
                    <span class="text-mono" style="font-weight: 600; color: ${scan.total_vulnerabilities > 0 ? 'var(--accent-red)' : 'var(--accent-green)'};">${scan.total_vulnerabilities}</span>
                </td>
                <td>
                    <span style="color: var(--text-secondary); font-size: 13px;">${new Date(scan.created_at).toLocaleDateString()}</span>
                </td>
                <td>
                    <div style="display: flex; gap: 8px;">
                        <a href="/web/scans/${scan.id}" class="btn btn-secondary" style="padding: 6px 12px; font-size: 13px;">
                            View
                        </a>
                        <a href="/api/reports/${scan.id}/html" target="_blank" class="btn btn-secondary" style="padding: 6px 12px; font-size: 13px;">
                            Report
                        </a>
                        <button onclick="deleteScan(${scan.id})" class="btn btn-secondary" style="padding: 6px 10px; color: var(--accent-red);">
                            ✕
                        </button>
                    </div>
                </td>
            </tr>
        `).join('');
        
        renderPagination(data.total, data.page, data.per_page);
        
    } catch (error) {
        console.error('Error loading scans:', error);
        document.getElementById('scans-table').innerHTML = `
            <tr>
                <td colspan="10">
                    <div class="empty-state">
                        <div class="empty-icon">⚠️</div>
                        <div class="empty-title">Error loading scans</div>
                        <div class="empty-description">Please try again</div>
                    </div>
                </td>
            </tr>`;
    }
}

function renderPagination(total, page, perPage) {
    const totalPages = Math.ceil(total / perPage);
    const pagination = document.getElementById('pagination');
    
    if (totalPages <= 1) {
        pagination.innerHTML = '';
        return;
    }
    
    let html = '<div style="display: flex; gap: 8px; align-items: center;">';
    
    html += `<button class="btn btn-secondary" style="padding: 8px 14px;" ${page === 1 ? 'disabled' : ''} onclick="loadScans(${page - 1})">←</button>`;
    
    for (let i = 1; i <= totalPages; i++) {
        if (i === 1 || i === totalPages || (i >= page - 1 && i <= page + 1)) {
            html += `<button class="btn ${i === page ? 'btn-primary' : 'btn-secondary'}" style="padding: 8px 14px;" onclick="loadScans(${i})">${i}</button>`;
        } else if (i === page - 2 || i === page + 2) {
            html += '<span style="color: var(--text-tertiary);">...</span>';
        }
    }
    
    html += `<button class="btn btn-secondary" style="padding: 8px 14px;" ${page === totalPages ? 'disabled' : ''} onclick="loadScans(${page + 1})">→</button>`;
    
    html += '</div>';
    pagination.innerHTML = html;
}

async function deleteScan(id) {
    if (!confirm('Delete this scan?')) return;
    
    try {
        const response = await fetch(`/api/scans/${id}`, { method: 'DELETE' });
        if (response.ok) {
            loadScans(currentPage);
        }
    } catch (error) {
        console.error('Error deleting scan:', error);
    }
}

document.getElementById('search-target').addEventListener('keypress', function(e) {
    if (e.key === 'Enter') loadScans(1);
});

loadScans(1);
</script>
{% endblock %}
