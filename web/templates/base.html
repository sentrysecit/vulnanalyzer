<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}VulnAnalyzer{% endblock %}</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.0/font/bootstrap-icons.css" rel="stylesheet">
    <style>
        :root {
            --primary: #2c3e50;
            --secondary: #3498db;
            --critical: #e74c3c;
            --high: #f39c12;
            --medium: #f1c40f;
            --low: #27ae60;
            --info: #3498db;
        }

        body {
            background-color: #f8f9fa;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        .sidebar {
            background: var(--primary);
            min-height: 100vh;
            padding-top: 20px;
        }

        .sidebar .nav-link {
            color: rgba(255, 255, 255, 0.8);
            padding: 12px 20px;
            border-radius: 8px;
            margin: 4px 10px;
        }

        .sidebar .nav-link:hover {
            background: rgba(255, 255, 255, 0.1);
            color: white;
        }

        .sidebar .nav-link.active {
            background: var(--secondary);
            color: white;
        }

        .main-content {
            padding: 30px;
        }

        .card-stat {
            border: none;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.1);
            transition: transform 0.3s ease;
        }

        .card-stat:hover {
            transform: translateY(-5px);
        }

        .stat-icon {
            font-size: 2.5rem;
            opacity: 0.8;
        }

        .severity-badge {
            padding: 5px 12px;
            border-radius: 20px;
            font-weight: bold;
            font-size: 0.85em;
        }

        .severity-critical {
            background: var(--critical);
            color: white;
        }

        .severity-high {
            background: var(--high);
            color: white;
        }

        .severity-medium {
            background: var(--medium);
            color: #2c3e50;
        }

        .severity-low {
            background: var(--low);
            color: white;
        }

        .severity-info {
            background: var(--info);
            color: white;
        }

        .status-badge {
            padding: 5px 12px;
            border-radius: 20px;
            font-size: 0.85em;
        }

        .status-pending {
            background: #6c757d;
            color: white;
        }

        .status-running {
            background: #0dcaf0;
            color: white;
        }

        .status-completed {
            background: #198754;
            color: white;
        }

        .status-failed {
            background: #dc3545;
            color: white;
        }

        .table-container {
            background: white;
            border-radius: 12px;
            padding: 20px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.1);
        }

        .btn-primary {
            background: var(--secondary);
            border: none;
        }

        .btn-primary:hover {
            background: #2980b9;
        }

        .page-header {
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            color: white;
            padding: 30px;
            border-radius: 12px;
            margin-bottom: 30px;
        }

        .chart-container {
            position: relative;
            height: 300px;
        }
    </style>
    {% block extra_css %}{% endblock %}
</head>

<body>
    <div class="container-fluid">
        <div class="row">
            <div class="col-md-2 sidebar">
                <h4 class="text-white text-center mb-4">
                    <i class="bi bi-shield-check"></i> VulnAnalyzer
                </h4>
                <nav class="nav flex-column">
                    <a class="nav-link {% if request.url.path == '/web/dashboard' %}active{% endif %}"
                        href="/web/dashboard">
                        <i class="bi bi-speedometer2 me-2"></i> Dashboard
                    </a>
                    <a class="nav-link {% if '/web/scans' in request.url.path %}active{% endif %}" href="/web/scans">
                        <i class="bi bi-search me-2"></i> Análisis
                    </a>
                    <a class="nav-link {% if '/web/scan/new' in request.url.path %}active{% endif %}"
                        href="/web/scan/new">
                        <i class="bi bi-plus-circle me-2"></i> Nuevo Análisis
                    </a>
                </nav>
            </div>
            <div class="col-md-10 main-content">
                {% block content %}{% endblock %}
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    {% block extra_js %}{% endblock %}
</body>

</html>
